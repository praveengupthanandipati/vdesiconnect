<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VDesi Connect — Your Indian Marketplace</title>

    <!-- Loader styles — loaded before any JS bundle -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap');

      #app-loader {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #002d12 0%, #005523 45%, #007730 80%, #00903a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
        font-family: 'Poppins', sans-serif;
      }

      /* dot-grid pattern — matches vendor banner */
      #app-loader::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1.5px, transparent 1.5px);
        background-size: 26px 26px;
        pointer-events: none;
      }

      /* diagonal stripe accent */
      #app-loader::after {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          -55deg,
          transparent,
          transparent 40px,
          rgba(255,255,255,0.025) 40px,
          rgba(255,255,255,0.025) 42px
        );
        pointer-events: none;
      }

      #app-loader.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* ── Brand text ── */
      .al-brand {
        position: relative;
        z-index: 1;
        text-align: center;
        margin-bottom: 36px;
      }

      .al-logo-ring {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        border: 2px solid rgba(255,255,255,0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 18px;
        animation: al-pulse 2s ease-in-out infinite;
      }

      .al-logo-letter {
        font-size: 2rem;
        font-weight: 800;
        color: #fff;
        line-height: 1;
      }

      .al-logo-letter span {
        color: #f58020;
      }

      .al-brand-name {
        font-size: 1.6rem;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.3px;
        display: block;
        margin-bottom: 6px;
      }

      .al-brand-name span { color: #f58020; }

      .al-brand-tag {
        font-size: 0.7rem;
        color: rgba(255,255,255,0.55);
        letter-spacing: 2.5px;
        text-transform: uppercase;
        display: block;
      }

      /* ── Spinner ── */
      .al-spinner-wrap {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }

      .al-spinner {
        width: 52px;
        height: 52px;
        position: relative;
      }

      .al-spinner::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3.5px solid rgba(255,255,255,0.12);
      }

      .al-spinner::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3.5px solid transparent;
        border-top-color: #f58020;
        border-right-color: rgba(245,128,32,0.45);
        animation: al-spin 0.85s cubic-bezier(0.4,0,0.2,1) infinite;
      }

      .al-dots {
        display: flex;
        gap: 8px;
      }

      .al-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(255,255,255,0.35);
        animation: al-bounce 1.2s ease-in-out infinite;
      }

      .al-dot:nth-child(1) { animation-delay: 0s; }
      .al-dot:nth-child(2) { animation-delay: 0.18s; }
      .al-dot:nth-child(3) { animation-delay: 0.36s; }

      @keyframes al-spin {
        to { transform: rotate(360deg); }
      }

      @keyframes al-pulse {
        0%, 100% { transform: scale(1);   opacity: 1; }
        50%       { transform: scale(1.06); opacity: 0.85; }
      }

      @keyframes al-bounce {
        0%, 80%, 100% { transform: translateY(0);    opacity: 0.35; }
        40%            { transform: translateY(-6px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Full-page loader — visible before React mounts -->
    <div id="app-loader">
      <div class="al-brand">
        <div class="al-logo-ring">
          <span class="al-logo-letter">V<span>D</span></span>
        </div>
        <span class="al-brand-name">VDesi <span>Connect</span></span>
        <span class="al-brand-tag">Your Indian Marketplace</span>
      </div>
      <div class="al-spinner-wrap">
        <div class="al-spinner"></div>
        <div class="al-dots">
          <div class="al-dot"></div>
          <div class="al-dot"></div>
          <div class="al-dot"></div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
